openapi: 3.0.1
info:
  title: Workflow
  version: 0.1.0
servers:
- url: "{server}:{port}/workflow"
  variables:
    server:
      default: http://localhost
    port:
      default: "8234"
paths:
  /definitions:
    get:
      summary: Lists all registered workflow types with schema and worker info.
      operationId: getDefinitions
      parameters:
      - name: x-user-roles
        in: header
        description: Optional comma-separated roles from the `x-user-roles` header.
        schema:
          type: string
          nullable: true
      - name: x-user-id
        in: header
        description: Optional caller identity from the `x-user-id` header.
        schema:
          type: string
          nullable: true
      responses:
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorPayload"
        "401":
          description: Unauthorized
        "503":
          description: ServiceUnavailable
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: object
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorPayload"
  /workflows:
    get:
      summary: Lists workflow instances with optional status/type/id/time filters
        and pagination.
      operationId: getWorkflows
      parameters:
      - name: x-user-roles
        in: header
        description: Optional comma-separated roles from the `x-user-roles` header.
        schema:
          type: string
          nullable: true
      - name: startTimeFrom
        in: query
        description: Optional ISO-8601 lower bound on workflow start time.
        schema:
          type: string
          nullable: true
      - name: startedBy
        in: query
        description: Filter by starter user ID captured from `x-user-id` on workflow
          start.
        schema:
          type: string
          nullable: true
      - name: startTimeTo
        in: query
        description: Optional ISO-8601 upper bound on workflow start time.
        schema:
          type: string
          nullable: true
      - name: closeTimeTo
        in: query
        description: Optional ISO-8601 upper bound on workflow close time.
        schema:
          type: string
          nullable: true
      - name: limit
        in: query
        schema:
          type: integer
          format: int64
          default: 20
      - name: closeTimeFrom
        in: query
        description: Optional ISO-8601 lower bound on workflow close time.
        schema:
          type: string
          nullable: true
      - name: workflowType
        in: query
        description: Filter by workflow type name.
        schema:
          type: string
          nullable: true
      - name: pageToken
        in: query
        description: Pagination cursor from a previous response.
        schema:
          type: string
          nullable: true
      - name: x-user-id
        in: header
        description: Optional caller identity from the `x-user-id` header.
        schema:
          type: string
          nullable: true
      - name: workflowId
        in: query
        description: Filter by workflow ID prefix.
        schema:
          type: string
          nullable: true
      - name: status
        in: query
        description: "Filter by workflow status (e.g. `RUNNING`, `COMPLETED`)."
        schema:
          type: string
          nullable: true
      responses:
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorPayload"
        "401":
          description: Unauthorized
        "503":
          description: ServiceUnavailable
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: object
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorPayload"
    post:
      summary: Starts a new workflow instance.
      operationId: postWorkflows
      parameters:
      - name: x-user-roles
        in: header
        description: Optional comma-separated roles from the `x-user-roles` header.
        schema:
          type: string
          nullable: true
      - name: x-user-id
        in: header
        description: Optional caller identity from the `x-user-id` header.
        schema:
          type: string
          nullable: true
      requestBody:
        description: "Request body containing `workflowType`, optional `input`, `workflowId`,\
          \ and `timeoutSeconds`."
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorPayload"
        "401":
          description: Unauthorized
        "503":
          description: ServiceUnavailable
        "201":
          description: Created
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                - {}
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorPayload"
  /workflows/{workflowId}:
    get:
      summary: Returns execution info for the latest run of a workflow.
      operationId: getWorkflowsWorkflowid
      parameters:
      - name: workflowId
        in: path
